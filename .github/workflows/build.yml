name: Build Rythim Music APK

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths-ignore:
      - "README.md"
      - "fastlane/**"
      - "assets/**"
      - ".github/**/*.md"
      - ".github/FUNDING.yml"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: write

jobs:
  build:
    name: Build APK (${{ matrix.variant }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: foss
            variantName: Foss
            apkName: Rythim-Music-foss.apk
          - variant: gms
            variantName: Gms
            apkName: Rythim-Music-gms.apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ensure dummy discord AAR exists
        run: |
          mkdir -p app/libs
          if [ ! -f "app/libs/discord_partner_sdk.aar" ]; then
            python3 -c "
import zipfile
with zipfile.ZipFile('app/libs/discord_partner_sdk.aar', 'w') as z:
    z.writestr('AndroidManifest.xml', '<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\" package=\"com.discord.sdk\"></manifest>')
print('Dummy AAR created')
"
          fi

      - name: Build Release APK
        run: |
          ./gradlew --console=plain \
            assemble${{ matrix.variantName }}Release \
            --warning-mode summary \
            -x lint \
            --stacktrace
        env:
          RYTHIM_APPLICATION_ID: com.rythim.music
          RYTHIM_APP_NAME: Rythim Music
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        id: sign_apk
        with:
          releaseDir: app/build/outputs/apk/${{ matrix.variant }}/release/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename and move signed APK
        run: |
          OUTPUT_DIR="app/build/outputs/apk/${{ matrix.variant }}/release"
          mkdir -p "$OUTPUT_DIR/out"
          find "$OUTPUT_DIR" -maxdepth 1 \( -name "*-signed.apk" -o -name "*-unsigned-signed.apk" \) \
            -exec mv {} "$OUTPUT_DIR/out/${{ matrix.apkName }}" \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.apkName }}
          path: app/build/outputs/apk/${{ matrix.variant }}/release/out/${{ matrix.apkName }}
          retention-days: 30
